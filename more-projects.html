<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>More Projects - Sam's Data Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-brand">Sam's Data Portfolio</a>
            <div class="nav-menu">
                <a href="index.html" class="nav-link">Home</a>
                <a href="more-projects.html" class="nav-link active">More Projects</a>
                <a href="projects/certificates.html" class="nav-link">Certificates & Journey</a>
            </div>
        </div>
    </nav>

    <!-- Header Hero Banner for More Projects -->
    <header class="hero-banner" style="padding: 4rem 2rem;">
        <div class="hero-container">
            <h1 class="hero-title" style="font-size: 2.5rem;">More Projects</h1>
            <p class="hero-bio">
                A complete catalog of my data science projects, broken down by year. Use the filters below to find specific topics like A/B Testing, ML, or Bayesian Statistics.
            </p>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="main-layout">
        <!-- Search and Filter Panel -->
        <div class="filter-bar">
            <input type="text" id="search" class="search-input" placeholder="Search titles, snippets, full text (regex)..." aria-label="Search projects">
            <div class="categories" id="category-filters">
                <button class="cat-btn active" data-category="all">All Projects</button>
                <button class="cat-btn" data-category="stats">A/B Testing & Stats</button>
                <button class="cat-btn" data-category="causal">Causal Inference</button>
                <button class="cat-btn" data-category="ml">Machine Learning</button>
                <button class="cat-btn" data-category="ai">GenAI & Agents</button>
                <button class="cat-btn" data-category="mlops">MLOps</button>
                <button class="cat-btn" data-category="bayesian">Bayesian</button>
                <button class="cat-btn" data-category="music">Music Analytics</button>
                <button class="cat-btn" data-category="forecast">Forecasting</button>
                <button class="cat-btn" data-category="simulation">Simulation</button>
                <button class="cat-btn" data-category="apps-dev">Software & Apps</button>
                <button class="cat-btn" data-category="data-eng">Data Engineering</button>
            </div>
        </div>

        <!-- Project Cards Grid -->
        <div id="project-container">
            <div style="padding: 2rem; text-align: center; color: var(--text-muted);">Loading portfolio projects...</div>
        </div>
    </main>

    <!-- Load data script -->
    <script src="projects_data.js"></script>
    
    <!-- Client-side logic for search, category filtering, grouping by year, and metadata rendering -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const projectContainer = document.getElementById('project-container');
            const searchInput = document.getElementById('search');
            const filterContainer = document.getElementById('category-filters');
            let allProjects = [];

            // Category assignment helper based on project title
            function getCategories(title) {
                const lowerTitle = title.toLowerCase();
                const tags = [];
                
                if (lowerTitle.includes('test') || lowerTitle.includes('anova') || lowerTitle.includes('manova') || lowerTitle.includes('correlation') || lowerTitle.includes('ab test') || lowerTitle.includes('proportions') || lowerTitle.includes('means') || lowerTitle.includes('rank') || lowerTitle.includes('z-score') || lowerTitle.includes('loo')) {
                    tags.push({ id: 'stats', label: 'A/B Testing & Stats' });
                }
                if (lowerTitle.includes('causal') || lowerTitle.includes('did') || lowerTitle.includes('difference-in-differences') || lowerTitle.includes('difference in differences') || lowerTitle.includes('synthetic control')) {
                    tags.push({ id: 'causal', label: 'Causal Inference' });
                }
                if (lowerTitle.includes('machine learning') || lowerTitle.includes('deep learning') || lowerTitle.includes('regression') || lowerTitle.includes('regressor') || lowerTitle.includes('forest') || lowerTitle.includes('knn') || lowerTitle.includes('clustering') || lowerTitle.includes('k-means') || lowerTitle.includes('classification') || lowerTitle.includes('classifying') || lowerTitle.includes('outliers') || lowerTitle.includes('anomalies') || lowerTitle.includes('polar plunge') || lowerTitle.includes('mmm') || lowerTitle.includes('mood trends') || lowerTitle.includes('embeddings')) {
                    tags.push({ id: 'ml', label: 'Machine Learning' });
                }
                if ((/\bai\b/.test(lowerTitle)) || lowerTitle.includes('agent') || lowerTitle.includes('llm') || lowerTitle.includes('nlp') || lowerTitle.includes('sentiment') || lowerTitle.includes('explainability') || lowerTitle.includes('parser') || lowerTitle.includes('multimodal') || lowerTitle.includes('thinking')) {
                    tags.push({ id: 'ai', label: 'GenAI & Agents' });
                }
                if (lowerTitle.includes('mlops') || lowerTitle.includes('gcp') || lowerTitle.includes('cloud') || lowerTitle.includes('etl')) {
                    tags.push({ id: 'mlops', label: 'MLOps' });
                }
                if (lowerTitle.includes('bayesian')) {
                    tags.push({ id: 'bayesian', label: 'Bayesian' });
                }
                if (lowerTitle.includes('spotify') || lowerTitle.includes('song') || lowerTitle.includes('band') || lowerTitle.includes('takeover') || lowerTitle.includes('marley') || lowerTitle.includes('music') || lowerTitle.includes('nelson') || lowerTitle.includes('podcast')) {
                    tags.push({ id: 'music', label: 'Music Analytics' });
                }
                if (lowerTitle.includes('forecast') || lowerTitle.includes('forecasting') || lowerTitle.includes('prophet') || lowerTitle.includes('time series')) {
                    tags.push({ id: 'forecast', label: 'Forecasting' });
                }
                if (lowerTitle.includes('simulation') || lowerTitle.includes('sir model') || lowerTitle.includes('overbooking')) {
                    tags.push({ id: 'simulation', label: 'Simulation' });
                }
                if (lowerTitle.includes('phonetag') || lowerTitle.includes('scranton-os') || lowerTitle.includes('scrantonos') || lowerTitle.includes('parser') || lowerTitle.includes('app') || lowerTitle.includes('command center') || lowerTitle.includes('platform') || lowerTitle.includes('dashboard') || lowerTitle.includes('web')) {
                    tags.push({ id: 'apps-dev', label: 'Software & Apps' });
                }
                if (lowerTitle.includes('bigquery') || lowerTitle.includes('gcp') || lowerTitle.includes('cloud') || lowerTitle.includes('etl') || lowerTitle.includes('mlops') || lowerTitle.includes('sql') || lowerTitle.includes('database')) {
                    tags.push({ id: 'data-eng', label: 'Data Engineering' });
                }
                
                return tags;
            }

            const projectTexts = {};

            try {
                const data = window.PROJECTS_DATA;
                const yearPattern = /^(2019|2020|2021|2022|2023|2024|2025|2026)$/;
                
                let currentYear = 'Unknown Year';
                
                data.forEach(p => {
                    const title = p.title.trim();
                    if (yearPattern.test(title)) {
                        currentYear = title;
                    } else if (p.slug !== 'cv.html' && p.slug !== 'certificates.html' && p.slug !== 'reading-list.html' && p.slug !== 'new-project.html' && p.slug !== 'home.html') {
                        p.year = currentYear;
                        allProjects.push(p);
                    }
                });

                renderProjects(allProjects);

                // Fetch full-text content of local projects asynchronously
                allProjects.forEach(async (p) => {
                    if (p.slug && !p.slug.startsWith('http')) {
                        try {
                            const res = await fetch(`projects/${p.slug}`);
                            if (res.ok) {
                                const html = await res.text();
                                const doc = new DOMParser().parseFromString(html, 'text/html');
                                const article = doc.querySelector('.post-content') || doc.body;
                                if (article) {
                                    projectTexts[p.slug] = article.textContent.toLowerCase().replace(/\s+/g, ' ');
                                }
                            }
                        } catch (err) {
                            console.warn(`Failed to preload text for ${p.slug}:`, err);
                        }
                    }
                });
            } catch (err) {
                projectContainer.innerHTML = '<div style="color: red; text-align: center;">Error loading projects.</div>';
                console.error(err);
            }

            function renderProjects(items) {
                if (items.length === 0) {
                    projectContainer.innerHTML = '<div style="padding: 2rem; text-align: center; color: var(--text-muted);">No projects match your search criteria.</div>';
                    return;
                }

                // Group by year
                const grouped = {};
                items.forEach(p => {
                    if (!grouped[p.year]) grouped[p.year] = [];
                    grouped[p.year].push(p);
                });

                // Sort years descending
                const sortedYears = Object.keys(grouped).sort((a, b) => {
                    if (a === 'Unknown Year') return 1;
                    if (b === 'Unknown Year') return -1;
                    return parseInt(b) - parseInt(a);
                });

                let html = '';
                
                sortedYears.forEach(year => {
                    const yearProjects = grouped[year];
                    if (yearProjects.length === 0) return;
                    
                    html += `<div class="year-section">
                        <h2 class="year-header">${year}</h2>
                        <div class="project-list">`;
                        
                    html += yearProjects.map(p => {
                        const categories = getCategories(p.title);
                        const tagsHtml = categories.map(cat => `<span class="tag" style="background-color: var(--code-bg); color: var(--accent); font-weight: 500;">${cat.label}</span>`).join(' ');
                        const snippetHtml = p.snippet ? `<p class="project-desc">${p.snippet}</p>` : '';
                        
                        const isExternal = p.slug.startsWith('http');
                        const href = isExternal ? p.slug : `projects/${p.slug}`;
                        const targetAttr = isExternal ? ' target="_blank" rel="noopener noreferrer"' : '';
                        
                        const isAsset = p.image.startsWith('assets/') || p.image.startsWith('http');
                        const imgSrc = isAsset ? p.image : `projects/${p.image}`;
                        const fitType = p.slug === 'bayesian-cortex-agent-routing.html' ? 'cover' : 'contain';
                        const imageHtml = p.image ? `<img src="${imgSrc}" alt="${p.title}" class="project-thumb" style="object-fit: ${fitType}; background-color: #f8f9fc;" fetchpriority="high">` : '';
                        
                        return `
                            <a href="${href}"${targetAttr} class="project-card">
                                ${imageHtml}
                                <div class="project-card-body">
                                    <div class="project-header">
                                        <h3 class="project-title">${p.title}</h3>
                                        ${p.date ? `<div class="project-date" style="font-size: 0.8rem; color: var(--text-muted); margin-top: 0.25rem; font-weight: 500;">${p.date}</div>` : ''}
                                    </div>
                                    ${snippetHtml}
                                    <div class="project-tags">
                                        ${tagsHtml}
                                    </div>
                                </div>
                            </a>
                        `;
                    }).join('');
                    
                    html += `</div></div>`;
                });

                projectContainer.innerHTML = html;
            }

            // Real-time search and filter functionality
            function filterProjects() {
                const rawQuery = searchInput.value.trim();
                const activeBtn = filterContainer.querySelector('.cat-btn.active');
                const category = activeBtn ? activeBtn.getAttribute('data-category') : 'all';

                let queryRegex = null;
                if (rawQuery) {
                    try {
                        queryRegex = new RegExp(rawQuery, 'i');
                    } catch (e) {
                        // Fall back to literal search by escaping special regex characters
                        const escaped = rawQuery.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
                        queryRegex = new RegExp(escaped, 'i');
                    }
                }

                const filtered = allProjects.filter(p => {
                    let matchesSearch = true;
                    if (queryRegex) {
                        const titleMatch = queryRegex.test(p.title);
                        const snippetMatch = p.snippet ? queryRegex.test(p.snippet) : false;
                        const fullText = projectTexts[p.slug] || "";
                        const fullTextMatch = fullText ? queryRegex.test(fullText) : false;
                        matchesSearch = titleMatch || snippetMatch || fullTextMatch;
                    }
                    
                    if (category === 'all') {
                        return matchesSearch;
                    } else {
                        const categories = getCategories(p.title);
                        const hasCategory = categories.some(cat => cat.id === category);
                        return matchesSearch && hasCategory;
                    }
                });

                renderProjects(filtered);
            }

            searchInput.addEventListener('input', filterProjects);

            filterContainer.addEventListener('click', (e) => {
                if (e.target.classList.contains('cat-btn')) {
                    filterContainer.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
                    e.target.classList.add('active');
                    filterProjects();
                }
            });
        });
    </script>
</body>
</html>
